<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>STRATA — Formulir</title>
<link rel="icon" type="image/png" href="/strata/favicon.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: #0F1D3F; }
  iframe { width: 100%; height: 100vh; border: none; display: block; }
  .loading {
    position: fixed; inset: 0; background: #0F1D3F;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; color: #fff;
    font-family: system-ui, sans-serif; font-size: 14px;
    transition: opacity .4s;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,.2);
    border-top-color: #60A5FA; border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div>Memuat formulir...</div>
</div>
<iframe id="app" src="" allow="clipboard-write"
  onload="document.getElementById('loading').style.opacity='0';
          setTimeout(function(){document.getElementById('loading').style.display='none'},400)">
</iframe>
<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxe01PAfRe1X3IibAWpzxvApXDnsA78atlJvrJwMsVlZxHWy2ymbKreIeeCqbeXF8RB/exec';
var slug = new URLSearchParams(window.location.search).get('id') || '';
if (!slug) {
  document.getElementById('loading').innerHTML =
    '<div style="text-align:center;padding:20px;color:#FCA5A5;font-family:system-ui;line-height:1.8">' +
    'ID formulir tidak ditemukan.<br>' +
    '<small style="color:rgba(255,255,255,.5)">Contoh: /strata/f/?id=FORM_001</small></div>';
} else {
  document.getElementById('app').src = GAS_URL + '?page=form&id=' + encodeURIComponent(slug);
}
</script>
</body>
</html>
