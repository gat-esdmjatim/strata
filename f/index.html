<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>STRATA — Memuat Formulir...</title>
<link rel="icon" type="image/png" href="/strata/favicon.png">
<style>
  body {
    font-family: system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; margin: 0;
    background: linear-gradient(135deg, #0F1D3F, #1B4FD8);
  }
  .box { text-align: center; color: #fff; padding: 40px 24px; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,.2);
    border-top-color: #60A5FA; border-radius: 50%;
    animation: spin .65s linear infinite; margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  h2 { font-size: 18px; margin: 0 0 8px; font-weight: 700; }
  p  { font-size: 13px; color: rgba(255,255,255,.6); margin: 0; }
  .err { color: #FCA5A5; font-weight: 600; margin-top: 12px; font-size: 14px; }
</style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spin"></div>
  <h2>STRATA</h2>
  <p id="msg">Mengalihkan ke formulir, mohon tunggu...</p>
  <div class="err" id="err" style="display:none"></div>
</div>
<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbz3jEe5ciLZxZ9W52rWWzYCjOQ1QbPNQK9bB0R8GSR-fcVfbQandHkQ1MwFvoIpYl2d/exec';
function getSlug() {
  var parts = window.location.pathname.split('/').filter(function(p){ return p.length > 0; });
  var slug = parts[parts.length - 1];
  if (!slug || slug === 'f') slug = '';
  var qs = new URLSearchParams(window.location.search);
  if (qs.get('id')) slug = qs.get('id');
  return slug;
}
var slug = getSlug();
if (!slug) {
  document.getElementById('spin').style.display = 'none';
  document.getElementById('err').style.display  = 'block';
  document.getElementById('err').textContent    = 'ID formulir tidak ditemukan dalam URL.';
  document.getElementById('msg').textContent    = 'Pastikan URL mengandung ID formulir.';
} else {
  document.getElementById('msg').textContent = 'Mengalihkan ke formulir: ' + slug;
  setTimeout(function(){ window.location.replace(GAS_URL + '?page=form&id=' + encodeURIComponent(slug)); }, 600);
}
</script>
</body>
</html>
